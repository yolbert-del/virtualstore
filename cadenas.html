<script>
    const URL_BASE_DATOS = "https://script.google.com/macros/s/AKfycbzjVixEyMOKuEPTFq-P9E3T8wsCWUjn2mgMUfgumDNgNiTZhFUU_vvtouCWHfbmb-27/exec";
    document.addEventListener("DOMContentLoaded", () => {
        sincronizarStock();
        actualizarContadorIcono();
    });

    async function sincronizarStock() {
        try {
            const respuesta = await fetch(URL_BASE_DATOS);
            const productos = await respuesta.json();
            
            productos.forEach(p => {
                // Actualiza el STOCK (esto ya lo tenías)
                let elStock = document.getElementById('stock-' + p.id);
                if (elStock) elStock.innerText = p.stock;

                //Actualiza el PRECIO visualmente ($)
                let elPrecio = document.getElementById('precio-' + p.id);
                if (elPrecio) elPrecio.innerText = '$' + p.precio;

                //Actualiza el PRECIO dentro del botón para que el carrito cobre bien
                let elBoton = document.getElementById('boton-' + p.id);
                if (elBoton) {
                elBoton.setAttribute("onclick", `carrito('${p.id}', '${p.nombre}', ${p.precio})`);
            }
            });
        } catch (error) {
            console.error("Error cargando stock y precios:", error);
        }
    }

    // MODIFICADO: Ya no envía el POST al Excel aquí
    function carrito(id, nombre, precio) {
        let stockElemento = document.getElementById('stock-' + id);
        if (!stockElemento) return;

        let stockDisponible = parseInt(stockElemento.innerText);

        if (stockDisponible > 0) {
            // 1. Actualizar pantalla visualmente
            stockElemento.innerText = stockDisponible - 1;

            // 2. Guardar en Carrito Local (Memoria del navegador)
            let carritoItems = JSON.parse(localStorage.getItem('mi_carrito')) || [];
            let itemEnCarrito = carritoItems.find(item => item.id === id);
            
            if (itemEnCarrito) {
                itemEnCarrito.cantidad += 1;
            } else {
                carritoItems.push({ id: id, nombre: nombre, precio: Number(precio), cantidad: 1 });
            }
            
            localStorage.setItem('mi_carrito', JSON.stringify(carritoItems));
            actualizarContadorIcono();
        } else {
            alert("¡Este producto se ha agotado!");
        }
    }

    function actualizarContadorIcono() {
        let carritoItems = JSON.parse(localStorage.getItem('mi_carrito')) || [];
        let total = carritoItems.reduce((acc, p) => acc + (p.cantidad || 0), 0);
        document.getElementById('cantidad-items').innerText = total;
    }
</script>
